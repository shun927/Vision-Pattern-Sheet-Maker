<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Vision Pattern Sheet Maker</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="controls" aria-label="マーカー設定">
        <div class="brand">
          <h1>Vision Pattern Sheet Maker</h1>
          <p>マーカーやキャリブレーションボードを印刷用に配置します。</p>
        </div>

        <div class="mode-tabs" role="tablist" aria-label="生成タイプ">
          <label>
            <input type="radio" name="pattern-mode" value="marker" checked />
            ArUco
          </label>
          <label>
            <input type="radio" name="pattern-mode" value="checkerboard" />
            チェッカー
          </label>
        </div>

        <form id="marker-form" class="editor pattern-panel">
          <fieldset>
            <legend>マーカー</legend>
            <label>
              種類
              <select id="dictionary"></select>
            </label>
            <div class="two-up">
              <label>
                ID
                <input id="marker-id" type="number" min="0" value="0" />
              </label>
              <label>
                サイズ(mm)
                <input id="marker-size" type="number" min="5" max="200" step="1" value="40" />
              </label>
            </div>
            <div class="two-up">
              <label>
                白余白(mm)
                <input id="quiet-zone" type="number" min="0" max="50" step="1" value="5" />
              </label>
              <label class="check">
                <input id="show-borders" type="checkbox" />
                枠線
              </label>
            </div>
            <button type="submit">このIDを追加</button>
          </fieldset>
        </form>

        <form id="checkerboard-form" class="editor pattern-panel" hidden>
          <fieldset>
            <legend>チェッカーボード</legend>
            <div class="two-up">
              <label>
                横マス
                <input id="checker-cols" type="number" min="2" max="80" value="9" />
              </label>
              <label>
                縦マス
                <input id="checker-rows" type="number" min="2" max="80" value="6" />
              </label>
            </div>
            <div class="two-up">
              <label>
                1マス(mm)
                <input id="checker-cell-size" type="number" min="2" max="100" step="1" value="18" />
              </label>
              <label>
                白余白(mm)
                <input id="checker-quiet-zone" type="number" min="0" max="80" step="1" value="10" />
              </label>
            </div>
            <div class="two-up">
              <label class="check">
                <input id="checker-start-black" type="checkbox" checked />
                左上黒
              </label>
              <label class="check">
                <input id="checker-border" type="checkbox" checked />
                枠線
              </label>
            </div>
            <button type="submit">ボードを追加</button>
          </fieldset>
        </form>

        <div class="range-controls pattern-panel">
          <fieldset>
            <legend>連番</legend>
            <div class="two-up">
              <label>
                開始ID
                <input id="range-start" type="number" min="0" value="0" />
              </label>
              <label>
                個数
                <input id="range-count" type="number" min="1" max="500" value="10" />
              </label>
            </div>
            <button id="fill-range" type="button">連番を追加</button>
          </fieldset>
        </div>

        <div class="sheet-controls">
          <fieldset>
            <legend>用紙</legend>
            <label>
              サイズ
              <select id="paper-size">
                <optgroup label="A判">
                  <option value="a3">A3</option>
                  <option value="a4" selected>A4</option>
                  <option value="a5">A5</option>
                  <option value="a6">A6</option>
                </optgroup>
                <optgroup label="B判(JIS)">
                  <option value="b4">B4</option>
                  <option value="b5">B5</option>
                  <option value="b6">B6</option>
                </optgroup>
                <optgroup label="US">
                  <option value="letter">Letter</option>
                  <option value="legal">Legal</option>
                  <option value="tabloid">Tabloid</option>
                </optgroup>
                <optgroup label="写真">
                  <option value="postcard">はがき</option>
                  <option value="l">L判</option>
                  <option value="kg">KG</option>
                  <option value="two-l">2L判</option>
                </optgroup>
              </select>
            </label>
            <div class="two-up">
              <label>
                余白(mm)
                <input id="page-margin" type="number" min="0" max="40" value="10" />
              </label>
              <label>
                間隔(mm)
                <input id="marker-gap" type="number" min="0" max="30" value="6" />
              </label>
            </div>
            <label class="check">
              <input id="show-labels" type="checkbox" checked />
              ラベルを表示
            </label>
          </fieldset>
        </div>

        <div class="actions">
          <button id="print-sheet" type="button">印刷</button>
          <button id="clear-all" type="button">全削除</button>
        </div>

        <p id="status" class="status" role="status"></p>
      </section>

      <section class="workspace" aria-label="印刷プレビュー">
        <div id="sheet-frame" class="sheet-frame">
          <div id="pages" class="pages"></div>
        </div>
      </section>
    </main>

        <template id="marker-template">
      <article class="marker-card">
        <button class="remove" type="button" aria-label="削除">×</button>
        <div class="marker-box">
          <div class="marker-art"></div>
        </div>
        <div class="marker-label"></div>
      </article>
    </template>

    <script src="markers-data.js"></script>
    <script src="app.js"></script>
  </body>
</html>
